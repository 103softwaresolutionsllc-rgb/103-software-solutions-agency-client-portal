kind = "web"
previewPath = "/"
title = "103 Agency OS - Client Portal"
version = "1.0.0"
id = "artifacts/agency-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21486
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agency-os run dev"

[services.env]
PORT = "21486"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agency-os", "run", "build"]
publicDir = "artifacts/agency-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
