openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 103 Agency OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client management
  - name: projects
    description: Project management
  - name: tasks
    description: Task management
  - name: invoices
    description: Invoice management
  - name: phases
    description: Phase management
  - name: milestones
    description: Milestone management
  - name: activity
    description: Activity log
  - name: dashboard
    description: Dashboard metrics
  - name: portal
    description: Client portal (accessible via /portal/* and /client/*)
  - name: admin-portal
    description: Admin portal management (accessible via /admin/portal/* and /admin/projects/:id/*)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/client-login:
    post:
      operationId: clientLogin
      tags: [auth]
      summary: Client-only login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /client/project:
    get:
      operationId: getClientProject
      tags: [portal]
      summary: Get client portal project data (alias for /portal/project)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal project data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalProjectData"

  /portal/project:
    get:
      operationId: getPortalProject
      tags: [portal]
      summary: Get client portal project data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal project data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalProjectData"

  /portal/discovery:
    post:
      operationId: submitDiscoveryForm
      tags: [portal]
      summary: Submit or update the client discovery form
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                responses:
                  type: object
                  description: Key-value map of question IDs to answers
                  properties:
                    business_name:
                      type: string
                    business_description:
                      type: string
                    target_audience:
                      type: string
                    primary_goal:
                      type: string
                    top_competitors:
                      type: string
                    design_vibe:
                      type: string
                    must_haves:
                      type: string
                    magic_wand:
                      type: string
                    timeline:
                      type: string
                    additional_notes:
                      type: string
                  additionalProperties:
                    type: string
              required: [responses]
      responses:
        "200":
          description: Discovery form saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  submittedAt:
                    type: string
                    nullable: true
                required: [id]

  /portal/checklist/{itemId}:
    patch:
      operationId: toggleChecklistItem
      tags: [portal]
      summary: Mark a checklist item as complete or incomplete
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isCompleted:
                  type: boolean
              required: [isCompleted]
      responses:
        "200":
          description: Checklist item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isCompleted:
                    type: boolean
                  completedAt:
                    type: string
                    nullable: true
                required: [id, isCompleted]
        "404":
          description: Checklist item not found

  /portal/feedback:
    post:
      operationId: submitFeedbackRound
      tags: [portal]
      summary: Submit a new design feedback round
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                designArea:
                  type: string
                  description: The design area or page being reviewed
                feedbackText:
                  type: string
                  description: The client's feedback content
              required: [feedbackText]
      responses:
        "201":
          description: Feedback round created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  roundNumber:
                    type: integer
                  designArea:
                    type: string
                    nullable: true
                  feedbackText:
                    type: string
                  status:
                    type: string
                required: [id, roundNumber, feedbackText, status]
        "403":
          description: Max feedback rounds reached

  /portal/testimonial:
    post:
      operationId: submitTestimonial
      tags: [portal]
      summary: Submit a client testimonial
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                testimonialText:
                  type: string
              required: [rating, testimonialText]
      responses:
        "201":
          description: Testimonial submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  rating:
                    type: integer
                  testimonialText:
                    type: string
                required: [id, rating, testimonialText]
        "409":
          description: Testimonial already submitted

  /admin/projects/{id}/client-data:
    get:
      operationId: getAdminProjectClientData
      tags: [admin-portal]
      summary: Get admin view of client portal data for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client portal data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientData"
        "404":
          description: Not found

  /admin/projects/{id}/phase:
    put:
      operationId: advanceProjectPhase
      tags: [admin-portal]
      summary: Set the current phase for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phase:
                  type: integer
                  minimum: 1
                  maximum: 5
              required: [phase]
      responses:
        "200":
          description: Phase updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  currentPhase:
                    type: integer
                required: [id, currentPhase]

  /admin/projects/{id}/client-account:
    post:
      operationId: createProjectClientAccount
      tags: [admin-portal]
      summary: Create a client portal account for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAccount"
        "409":
          description: Email already exists

  /admin/projects/{id}/phases:
    get:
      operationId: getProjectPhases
      tags: [admin-portal]
      summary: List per-project phases with activation status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project phases
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId:
                    type: integer
                  currentPhase:
                    type: integer
                  phases:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectPhase"
                required: [projectId, currentPhase, phases]

  /admin/projects/{id}/phases/{phaseId}/toggle:
    patch:
      operationId: toggleProjectPhase
      tags: [admin-portal]
      summary: Activate or deactivate a specific phase for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: phaseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
              required: [active]
      responses:
        "200":
          description: Phase toggle updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  status:
                    type: string
                  isActive:
                    type: boolean
                required: [id, name, status, isActive]

  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: List all projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with phases, milestones, tasks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List all tasks
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /invoices:
    get:
      operationId: getInvoices
      tags: [invoices]
      summary: List all invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /phases:
    get:
      operationId: getPhases
      tags: [phases]
      summary: List phases
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Phase"
    post:
      operationId: createPhase
      tags: [phases]
      summary: Create a phase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseRequest"
      responses:
        "201":
          description: Created phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phase"

  /milestones:
    get:
      operationId: getMilestones
      tags: [milestones]
      summary: List milestones
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get activity log
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPage"

  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get dashboard metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        organizationId:
          type: integer
        createdAt:
          type: string
      required: [id, name, email, role, organizationId, createdAt]

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        status:
          type: string
        projectCount:
          type: integer
        portalPhase:
          type: integer
          nullable: true
        organizationId:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, email, status, projectCount, organizationId, createdAt, updatedAt]

    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        status:
          type: string
      required: [name, email, status]

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        budget:
          type: number
          nullable: true
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
        clientName:
          type: string
        organizationId:
          type: integer
        packageId:
          type: integer
          nullable: true
        packageName:
          type: string
          nullable: true
        currentPhase:
          type: integer
          nullable: true
        taskCount:
          type: integer
        completedTaskCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, status, clientId, clientName, organizationId, taskCount, completedTaskCount, createdAt, updatedAt]

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        budget:
          type: number
          nullable: true
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
      required: [name, status, clientId]

    ClientsByPhaseItem:
      type: object
      properties:
        phase:
          type: integer
        count:
          type: integer
      required: [phase, count]

    ClientAccount:
      type: object
      properties:
        email:
          type: string
        isActive:
          type: boolean
      required: [email, isActive]

    ProjectDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
