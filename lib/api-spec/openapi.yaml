openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 103 Agency OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client management
  - name: projects
    description: Project management
  - name: tasks
    description: Task management
  - name: invoices
    description: Invoice management
  - name: phases
    description: Phase management
  - name: milestones
    description: Milestone management
  - name: activity
    description: Activity log
  - name: dashboard
    description: Dashboard metrics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clients:
    get:
      operationId: getClients
      tags: [clients]
      summary: List all clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: List all projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with phases, milestones, tasks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List all tasks
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /invoices:
    get:
      operationId: getInvoices
      tags: [invoices]
      summary: List all invoices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /phases:
    get:
      operationId: getPhases
      tags: [phases]
      summary: List phases
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Phase"
    post:
      operationId: createPhase
      tags: [phases]
      summary: Create a phase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseRequest"
      responses:
        "201":
          description: Created phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phase"

  /milestones:
    get:
      operationId: getMilestones
      tags: [milestones]
      summary: List milestones
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get activity log
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPage"

  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get dashboard metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        organizationId:
          type: integer
        createdAt:
          type: string
      required: [id, name, email, role, organizationId, createdAt]

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        status:
          type: string
        projectCount:
          type: integer
        portalPhase:
          type: integer
          nullable: true
        organizationId:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, email, status, projectCount, organizationId, createdAt, updatedAt]

    CreateClientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        status:
          type: string
      required: [name, email, status]

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        budget:
          type: number
          nullable: true
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
        clientName:
          type: string
        organizationId:
          type: integer
        packageId:
          type: integer
          nullable: true
        packageName:
          type: string
          nullable: true
        currentPhase:
          type: integer
          nullable: true
        taskCount:
          type: integer
        completedTaskCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, status, clientId, clientName, organizationId, taskCount, completedTaskCount, createdAt, updatedAt]

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        budget:
          type: number
          nullable: true
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
      required: [name, status, clientId]

    ClientsByPhaseItem:
      type: object
      properties:
        phase:
          type: integer
        count:
          type: integer
      required: [phase, count]

    ClientAccount:
      type: object
      properties:
        email:
          type: string
        isActive:
          type: boolean
      required: [email, isActive]

    ProjectDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        budget:
          type: number
          nullable: true
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
        clientName:
          type: string
        organizationId:
          type: integer
        packageId:
          type: integer
          nullable: true
        packageName:
          type: string
          nullable: true
        currentPhase:
          type: integer
          nullable: true
        clientAccount:
          $ref: "#/components/schemas/ClientAccount"
          nullable: true
        taskCount:
          type: integer
        completedTaskCount:
          type: integer
        phases:
          type: array
          items:
            $ref: "#/components/schemas/Phase"
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, status, clientId, clientName, organizationId, taskCount, completedTaskCount, phases, milestones, tasks, createdAt, updatedAt]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          nullable: true
        projectId:
          type: integer
        projectName:
          type: string
        assigneeId:
          type: integer
          nullable: true
        assigneeName:
          type: string
          nullable: true
        organizationId:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, status, priority, projectId, projectName, organizationId, createdAt, updatedAt]

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          nullable: true
        projectId:
          type: integer
        assigneeId:
          type: integer
          nullable: true
      required: [title, status, priority, projectId]

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          nullable: true
        assigneeId:
          type: integer
          nullable: true

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        status:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          nullable: true
        paidDate:
          type: string
          nullable: true
        clientId:
          type: integer
        clientName:
          type: string
        projectId:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true
        organizationId:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, invoiceNumber, status, amount, clientId, clientName, organizationId, createdAt, updatedAt]

    CreateInvoiceRequest:
      type: object
      properties:
        invoiceNumber:
          type: string
        status:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          nullable: true
        clientId:
          type: integer
        projectId:
          type: integer
          nullable: true
      required: [invoiceNumber, status, amount, clientId]

    UpdateInvoiceRequest:
      type: object
      properties:
        status:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          nullable: true
        paidDate:
          type: string
          nullable: true

    Phase:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        order:
          type: integer
        status:
          type: string
        projectId:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, order, status, projectId, createdAt, updatedAt]

    CreatePhaseRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        order:
          type: integer
        status:
          type: string
        projectId:
          type: integer
      required: [name, order, status, projectId]

    Milestone:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          nullable: true
        completed:
          type: boolean
        projectId:
          type: integer
        phaseId:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, completed, projectId, createdAt, updatedAt]

    CreateMilestoneRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          nullable: true
        completed:
          type: boolean
        projectId:
          type: integer
        phaseId:
          type: integer
          nullable: true
      required: [name, completed, projectId]

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: integer
          nullable: true
        description:
          type: string
        userId:
          type: integer
          nullable: true
        userName:
          type: string
          nullable: true
        organizationId:
          type: integer
        createdAt:
          type: string
      required: [id, action, entityType, description, organizationId, createdAt]

    ActivityPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    DashboardMetrics:
      type: object
      properties:
        totalRevenue:
          type: number
        activeProjects:
          type: integer
        totalClients:
          type: integer
        overdueInvoices:
          type: integer
        overdueAmount:
          type: number
        pendingTasks:
          type: integer
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/RevenueMonth"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        clientsByPhase:
          type: array
          items:
            $ref: "#/components/schemas/ClientsByPhaseItem"
      required: [totalRevenue, activeProjects, totalClients, overdueInvoices, overdueAmount, pendingTasks, revenueByMonth, recentActivity]

    RevenueMonth:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
      required: [month, revenue]
